<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dalam Pengembangan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .container {
    text-align: center;
    padding: 2.5rem 2rem;
    max-width: 480px;
    width: 100%;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff8e1; color: #b45309;
    border: 1px solid #fcd34d;
    border-radius: 99px; padding: 6px 18px;
    font-size: 13px; font-weight: 600;
    margin-bottom: 1.5rem; letter-spacing: 0.3px;
  }
  .badge-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #f59e0b;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .scene { width: 300px; height: 320px; margin: 0 auto 2rem; position: relative; }

  /* Setiap lantai naik dari bawah ke posisi akhirnya */
  .floor {
    transform-origin: center bottom;
  }
  .floor-1  { animation: riseFloor 12s ease-in-out infinite; animation-delay: 0s; }
  .floor-2  { animation: riseFloor 12s ease-in-out infinite; animation-delay: 0.7s; }
  .floor-3  { animation: riseFloor 12s ease-in-out infinite; animation-delay: 1.4s; }
  .floor-4  { animation: riseFloor 12s ease-in-out infinite; animation-delay: 2.1s; }
  .floor-5  { animation: riseFloor 12s ease-in-out infinite; animation-delay: 2.8s; }
  .floor-6  { animation: riseFloor 12s ease-in-out infinite; animation-delay: 3.5s; }
  .floor-7  { animation: riseFloor 12s ease-in-out infinite; animation-delay: 4.2s; }
  .floor-8  { animation: riseFloor 12s ease-in-out infinite; animation-delay: 4.9s; }
  .floor-9  { animation: riseFloor 12s ease-in-out infinite; animation-delay: 5.6s; }
  .floor-10 { animation: riseFloor 12s ease-in-out infinite; animation-delay: 6.3s; }

  /* Mulai dari bawah (off-screen), naik ke posisi, diam */
  @keyframes riseFloor {
    0%   { opacity: 0; transform: translateY(30px); }
    8%   { opacity: 1; transform: translateY(0); }
    90%  { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(30px); }
  }

  /* Lampu jendela */
  @keyframes glow1 { 0%,100%{opacity:1} 45%{opacity:0.2} 50%{opacity:1} }
  @keyframes glow2 { 0%,100%{opacity:0.3} 30%{opacity:1} 60%{opacity:0.5} 80%{opacity:1} }
  @keyframes glow3 { 0%,100%{opacity:1} 20%{opacity:0.15} 25%{opacity:0.9} 70%{opacity:0.4} }
  @keyframes glow4 { 0%,100%{opacity:0.6} 50%{opacity:1} 75%{opacity:0.2} }
  .w-a { animation: glow1 3.1s ease-in-out infinite; }
  .w-b { animation: glow2 4.4s ease-in-out 0.8s infinite; }
  .w-c { animation: glow3 2.7s ease-in-out 1.5s infinite; }
  .w-d { animation: glow4 5.2s ease-in-out 0.3s infinite; }
  .w-e { animation: glow1 3.8s ease-in-out 2.1s infinite; }
  .w-f { animation: glow3 4.1s ease-in-out 1.0s infinite; }

  /* Debu */
  .d1 { animation: dustUp 2.8s ease-out infinite; }
  .d2 { animation: dustUp 2.8s ease-out 1s infinite; }
  .d3 { animation: dustUp 2.8s ease-out 1.9s infinite; }
  @keyframes dustUp { 0%{opacity:0;transform:translate(0,0)} 25%{opacity:.6} 100%{opacity:0;transform:translate(-10px,-22px)} }

  h1 { font-size: 26px; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
  p.sub { font-size: 15px; color: #64748b; margin-bottom: 2rem; line-height: 1.6; }

  .progress-card {
    background: #fff; border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
  }
  .prog-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .prog-label { font-size: 13px; color: #64748b; }
  .prog-pct { font-size: 13px; font-weight: 700; color: #1e40af; }
  .prog-track { height: 10px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
  .prog-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    width: 40%; animation: progGrow 3.5s ease-in-out infinite alternate;
  }
  @keyframes progGrow { from{width:42%} to{width:74%} }
  .prog-note { font-size: 12px; color: #94a3b8; margin-top: 10px; }

  .back-btn {
    display: inline-block; background: #2563eb; color: #fff;
    border: none; border-radius: 10px;
    padding: 12px 32px; font-size: 15px; font-weight: 600;
    cursor: pointer; text-decoration: none;
    transition: background 0.2s, transform 0.1s;
  }
  .back-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
  .back-btn:active { transform: scale(0.97); }
</style>
</head>

  <h1>Halaman Dalam Pembangunan</h1>
  <p class="sub">Kami sedang bekerja keras untuk menyiapkan halaman ini.<br>Mohon kembali lagi dalam waktu dekat.</p>

  <div class="progress-card">
    <div class="prog-header">
      <span class="prog-label">Progress pembangunan</span>
      <span class="prog-pct" id="pctLabel">56%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="progFill"></div>
    </div>
    <p class="prog-note">Segera hadir — terima kasih atas kesabaranmu 🙏</p>
  </div>

  <a href="javascript:void(0);" class="back-btn" onclick="alert('Kembali ke halaman sebelumnya.')">
    ← Kembali ke Beranda
  </a>
</div>

<script>
  const label = document.getElementById('pctLabel');
  const fill = document.getElementById('progFill');
  let v = 42, dir = 1;
  setInterval(() => {
    v += dir * 0.35;
    if (v >= 74) dir = -1;
    if (v <= 42) dir = 1;
    const r = Math.round(v);
    label.textContent = r + '%';
    fill.style.width = r + '%';
  }, 80);
</script>
