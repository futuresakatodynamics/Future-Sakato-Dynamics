<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0ede8;font-family:'Rajdhani',sans-serif;display:flex;align-items:center;justify-content:center;min-height:580px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(26,95,180,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(26,95,180,.055) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:28px 24px 24px;gap:0}

.badge{display:inline-flex;align-items:center;gap:8px;background:#1a3a6e;color:#fff;font-size:10px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;padding:6px 20px;border-radius:2px;margin-bottom:20px}
.dot{width:7px;height:7px;border-radius:50%;background:#d4930e;animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

.scene{position:relative;width:380px;height:300px;margin-bottom:16px}

/* ORBIT CENTER tepat di atas layar laptop */
.orbit-center{position:absolute;left:190px;top:38px;width:0;height:0}

/* BINTANG */
.star-el{position:absolute;width:22px;height:22px;transform-origin:0 0;display:flex;align-items:center;justify-content:center}
.star-el:nth-child(1){animation:sorb 1.7s linear infinite}
.star-el:nth-child(2){animation:sorb 1.7s linear infinite;animation-delay:-.57s}
.star-el:nth-child(3){animation:sorb 1.7s linear infinite;animation-delay:-1.13s}
.star-el:nth-child(4){animation:sorb 1.7s linear infinite;animation-delay:-.85s}
@keyframes sorb{from{transform:rotate(0deg) translateX(46px) rotate(0deg)}to{transform:rotate(360deg) translateX(46px) rotate(-360deg)}}
.star-el svg{animation:sspin .85s linear infinite;width:20px;height:20px}
@keyframes sspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* BURUNG */
.bird-el{position:absolute;width:30px;height:30px;transform-origin:0 0}
.bird-el:nth-child(1){animation:borb 2.3s linear infinite}
.bird-el:nth-child(2){animation:borb 2.3s linear infinite;animation-delay:-.77s}
.bird-el:nth-child(3){animation:borb 2.3s linear infinite;animation-delay:-1.53s}
@keyframes borb{
  0%  {transform:rotate(0deg)   translateX(58px) rotate(0deg)}
  49% {transform:rotate(176deg) translateX(58px) rotate(-176deg)}
  50% {transform:rotate(180deg) translateX(58px) rotate(-180deg) scaleX(-1)}
  99% {transform:rotate(356deg) translateX(58px) rotate(-356deg) scaleX(-1)}
  100%{transform:rotate(360deg) translateX(58px) rotate(-360deg)}
}
.bird-el svg{width:30px;height:30px}
.wt{animation:flap .26s ease-in-out infinite alternate;transform-origin:50% 100%}
.wb{animation:flap .26s ease-in-out infinite alternate .13s;transform-origin:50% 0%}
@keyframes flap{from{transform:scaleY(1)}to{transform:scaleY(.18)}}

/* LAPTOP wobble */
.laptop-wrap{position:absolute;bottom:20px;left:50%;transform:translateX(-50%)}
.laptop-shake{animation:wobble 1.6s ease-in-out infinite;transform-origin:190px 120px}
@keyframes wobble{
  0%,100%{transform:rotate(0deg) translateY(0)}
  18%{transform:rotate(-3deg) translateY(-2px)}
  36%{transform:rotate(2.5deg) translateY(-1px)}
  54%{transform:rotate(-3.5deg) translateY(-3px)}
  72%{transform:rotate(2deg) translateY(-1px)}
}

/* screen flicker */
.screen{animation:flicker 3.5s ease-in-out infinite}
@keyframes flicker{0%,86%,100%{opacity:1}89%{opacity:.25}92%{opacity:1}95%{opacity:.1}97%{opacity:1}}

/* error lines blink */
.el1{animation:eblink 2.2s step-end infinite}
.el2{animation:eblink 2.2s step-end infinite;animation-delay:.4s}
.el3{animation:eblink 2.2s step-end infinite;animation-delay:.8s}
@keyframes eblink{0%,100%{opacity:1}50%{opacity:.15}}

/* keringat dari laptop */
.sw1{animation:swfall 1.9s ease-in infinite}
.sw2{animation:swfall 1.9s ease-in infinite;animation-delay:.95s}
.sw3{animation:swfall 1.9s ease-in infinite;animation-delay:.45s}
@keyframes swfall{0%{transform:translateY(0);opacity:1}100%{transform:translateY(28px);opacity:0}}

/* smoke/uap dari laptop */
.smoke{animation:smokeup 2.4s ease-out infinite;transform-origin:center bottom}
.smoke:nth-child(2){animation-delay:.8s}
.smoke:nth-child(3){animation-delay:1.6s}
@keyframes smokeup{0%{transform:translateY(0) scale(.6);opacity:.7}100%{transform:translateY(-32px) scale(1.4);opacity:0}}

/* TEXT */
.txt{text-align:center;max-width:440px}
.code{font-family:'Bebas Neue',sans-serif;font-size:78px;line-height:1;color:#1a3a6e;letter-spacing:6px;margin-bottom:2px}
.etitle{font-size:21px;font-weight:700;color:#1a3a6e;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.emsg{font-size:15px;color:#6b6a66;line-height:1.65;margin-bottom:22px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 28px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:2px;cursor:pointer;border:none;text-decoration:none;transition:.18s}
.bp{background:#1a3a6e;color:#fff}.bp:hover{background:#1a5fb4;transform:translateY(-1px)}
.bs{background:transparent;color:#1a3a6e;border:1.5px solid #1a3a6e}.bs:hover{background:#1a3a6e;color:#fff;transform:translateY(-1px)}
</style>
</head>

<script>
function applyMode(){
  var offline=!navigator.onLine;
  var sr=document.getElementById('starRing');
  var br=document.getElementById('birdRing');
  var bt=document.getElementById('badgeText');
  var ec=document.getElementById('errCode');
  var et=document.getElementById('errTitle');
  var em=document.getElementById('errMsg');
  if(offline){
    sr.style.display='none'; br.style.display='block';
    bt.textContent='Koneksi Terputus';
    ec.textContent='OFFLINE'; ec.style.fontSize='50px'; ec.style.letterSpacing='3px';
    et.textContent='Ups! Internetmu Terputus';
    em.innerHTML='Laptopnya bingung... sinyal kemana?<br>Cek WiFi atau data selulermu, lalu muat ulang halaman.';
  } else {
    sr.style.display='block'; br.style.display='none';
    ec.style.fontSize=''; ec.style.letterSpacing='';
    var p=window.location.pathname;
    if(p.includes('500')||p.includes('server-error')){
      bt.textContent='Error Server'; ec.textContent='5 0 0';
      et.textContent='Server Sedang Rewel';
      em.innerHTML='Server ikutan pusing juga nih!<br>Tim teknis sedang memperbaiki, coba lagi beberapa saat ya.';
    } else if(p.includes('503')||p.includes('maintenance')){
      bt.textContent='Maintenance'; ec.textContent='503';
      et.textContent='Web Lagi Maintenance';
      em.innerHTML='Laptop sedang di-update biar makin kencang!<br>Website kembali online sebentar lagi. Terima kasih sabar menunggu.';
    }
  }
}
applyMode();
window.addEventListener('online',applyMode);
window.addEventListener('offline',applyMode);
</script>
